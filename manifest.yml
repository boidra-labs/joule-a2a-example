---
applications:
  - name: aif-analysis-agent
    docker:
      image: ghcr.io/codeminepl/aif-analysis-agent:0.13.11
      username: codemine-kwasniewskim
    memory: 512M
    disk_quota: 1G
    instances: 1
    health-check-type: http
    health-check-http-endpoint: /.well-known/agent-card.json
    timeout: 60
    env:
      LOG_LEVEL: INFO
      OTEL_SERVICE_NAME: aif-analysis-agent
      # Telemetry -> Codemine Telemetry Dashboard OTLP receiver. The SDK appends
      # /v1/traces, and the SAP Cloud SDK only supports grpc | http/protobuf
      # (NOT http/json), so the dashboard accepts protobuf.
      OTEL_EXPORTER_OTLP_ENDPOINT: https://codemine-telemetry-dashboard.cfapps.eu10-005.hana.ondemand.com/otel
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_METRICS_EXPORTER: none
      # AIF OData resolves at runtime from the dest-aif-service BTP destination.
    services:
      - aif-analysis-agent-aicore             # SAP AI Core (required — LLM + document grounding)
      - aif-analysis-agent-destination        # BTP Destination (required — resolves dest-aif-service)
      - aif-analysis-agent-xsuaa             # XSUAA (required — JWT auth)
      # - aif-analysis-agent-agent-memory      # SAP Agent Memory (optional — multi-turn memory)
      # - aif-analysis-agent-auditlog          # BTP Audit Log (optional)
      # - aif-analysis-agent-cloud-logging     # SAP Cloud Logging (logs + traces + metrics)
    routes:
      - route: aif-analysis-agent.cfapps.eu10-005.hana.ondemand.com
